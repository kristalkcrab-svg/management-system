<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TALKCRAB 员工资料 Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;900&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+Myanmar:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --crab-red:#EE1F27; --crab-red-dark:#B8151B; --deep-blue:#28256C; --gold:#C79A3A;
    --cream:#FAF5EC; --paper:#FFFFFF; --ink:#28241F; --ink-soft:#6B655C; --line:#E7DFD1;
    --good:#3E8E5A; --warn:#C79A3A;
    --level0:#B7B0A2; --level1:#7FA6C9; --level2:#4C89B8; --level3:#C79A3A; --level4:#EE1F27; --level5:#28256C;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--cream);font-family:'Noto Sans SC','Noto Sans Myanmar',sans-serif;color:var(--ink);}
  .shell{max-width:1180px;margin:0 auto;padding:24px 18px 60px;}
  .hidden{display:none !important;}

  header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid var(--crab-red);padding-bottom:16px;margin-bottom:22px;flex-wrap:wrap;gap:14px;}
  .brand{display:flex;align-items:center;gap:14px;}
  .crab-mark{height:58px;width:auto;flex-shrink:0;display:block;}
  .view-sub{margin:0;font-size:11px;color:var(--ink-soft);letter-spacing:2px;font-weight:700;}
  .header-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .btn{border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .12s,box-shadow .12s;white-space:nowrap;}
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--crab-red);color:#fff;box-shadow:0 3px 0 var(--crab-red-dark);}
  .btn-primary:hover{box-shadow:0 4px 8px rgba(238,31,39,.35);}
  .btn-ghost{background:transparent;color:var(--deep-blue);border:1.5px solid var(--deep-blue);}
  .btn-ghost:hover{background:var(--deep-blue);color:#fff;}
  .btn-sm{padding:6px 12px;font-size:12px;}
  .link-btn{background:none;border:none;color:var(--ink-soft);font-size:12px;text-decoration:underline;cursor:pointer;font-family:inherit;}

  .lang-switch{display:flex;gap:4px;background:#EFEAE0;border-radius:20px;padding:3px;}
  .lang-btn{border:none;background:none;padding:5px 10px;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;color:var(--ink-soft);font-family:inherit;}
  .lang-btn.active{background:var(--deep-blue);color:#fff;}

  .banner{background:#FFF8E9;border:1px solid var(--gold);border-radius:10px;padding:10px 14px;font-size:12px;color:#7A5A10;margin-bottom:20px;}
  .role-tag{display:inline-block;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:700;margin-left:8px;vertical-align:middle;}
  .role-boss{background:var(--crab-red);color:#fff;}
  .role-store{background:var(--deep-blue);color:#fff;}

  .outlet-tabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
  .outlet-tab{padding:10px 18px;border-radius:10px;border:1.5px solid var(--line);background:var(--paper);cursor:pointer;font-weight:700;font-size:14px;color:var(--ink-soft);}
  .outlet-tab.active{border-color:var(--crab-red);color:var(--crab-red-dark);background:#FFF3EF;}

  .clock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
  .clock-card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px;cursor:pointer;text-align:center;transition:box-shadow .15s,transform .15s;}
  .clock-card:hover{box-shadow:0 8px 20px rgba(28,24,20,.08);transform:translateY(-2px);}
  .clock-avatar{width:56px;height:56px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif SC',serif;font-weight:900;color:#fff;font-size:20px;background:var(--deep-blue);}
  .clock-name{font-weight:700;font-size:15px;}
  .clock-role{font-size:11px;color:var(--ink-soft);margin:2px 0 10px;}
  .status-pill{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
  .status-none{background:#EFEAE0;color:var(--ink-soft);}
  .status-in{background:#E5F3EA;color:var(--good);}
  .status-out{background:#EDEAF2;color:var(--deep-blue);}

  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px;}
  .sum-card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;}
  .sum-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gold);}
  .sum-card.red::before{background:var(--crab-red);}
  .sum-card.blue::before{background:var(--deep-blue);}
  .sum-card.green::before{background:var(--good);}
  .sum-label{font-size:12px;color:var(--ink-soft);letter-spacing:1px;}
  .sum-value{font-family:'Noto Serif SC',serif;font-weight:900;font-size:24px;margin-top:6px;}

  .outlet-split{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:26px;}
  .outlet-card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px;}
  .outlet-card h3{margin:0 0 10px;font-family:'Noto Serif SC',serif;color:var(--crab-red-dark);font-size:16px;}
  .outlet-card .row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px dashed var(--line);}
  .outlet-card .row:last-child{border-bottom:none;}
  .outlet-card .row b{color:var(--ink);}

  .tabs{display:flex;gap:8px;margin-bottom:18px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .tab-btn{background:none;border:none;padding:10px 6px;font-family:inherit;font-size:14px;font-weight:700;color:var(--ink-soft);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;}
  .tab-btn.active{color:var(--crab-red-dark);border-bottom-color:var(--crab-red);}

  .filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
  .filter-bar select,.filter-bar input{padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;background:var(--paper);color:var(--ink);}
  .filter-bar input{flex:1;min-width:150px;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px;position:relative;transition:box-shadow .15s,transform .15s;}
  .card:hover{box-shadow:0 8px 20px rgba(28,24,20,.08);}
  .card-top{display:flex;gap:12px;align-items:center;cursor:pointer;}
  .avatar{width:48px;height:48px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif SC',serif;font-weight:900;color:#fff;font-size:18px;background:var(--deep-blue);}
  .card-name{font-weight:700;font-size:16px;}
  .card-role{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .card-outlet{display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;background:var(--line);color:var(--ink-soft);margin-top:4px;}
  .card-mid{display:flex;justify-content:space-between;align-items:center;margin-top:14px;cursor:pointer;}
  .level-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;}
  .card-stats{margin-top:12px;display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);border-top:1px dashed var(--line);padding-top:10px;cursor:pointer;}
  .card-stats b{color:var(--ink);font-size:13px;display:block;}
  .card-actions{display:flex;gap:6px;margin-top:12px;}
  .mini-btn{flex:1;background:#F3EEE2;border:1px solid var(--line);border-radius:8px;padding:6px 4px;font-size:11px;font-weight:700;cursor:pointer;color:var(--deep-blue);font-family:inherit;text-align:center;}
  .mini-btn:hover{background:var(--deep-blue);color:#fff;}

  table{width:100%;border-collapse:collapse;background:var(--paper);border-radius:12px;overflow:hidden;border:1px solid var(--line);}
  th,td{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid var(--line);}
  th{background:#F3EEE2;color:var(--deep-blue);font-size:12px;letter-spacing:.5px;}
  tr:last-child td{border-bottom:none;}

  .overlay{display:none;position:fixed;inset:0;background:rgba(28,24,20,.55);align-items:center;justify-content:center;z-index:50;padding:20px;overflow-y:auto;}
  .overlay.active{display:flex;}
  .modal{background:var(--paper);border-radius:16px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;padding:26px 26px 22px;position:relative;margin:auto;}
  .modal.narrow{max-width:340px;text-align:center;}
  .modal.wide{max-width:680px;}
  .modal h2{font-family:'Noto Serif SC',serif;margin:0 0 4px;color:var(--crab-red-dark);font-size:21px;}
  .modal .sub{font-size:12px;color:var(--ink-soft);margin-bottom:18px;}
  .close-x{position:absolute;top:16px;right:18px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink-soft);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .field-row.full{grid-template-columns:1fr;}
  .field label{font-size:12px;color:var(--ink-soft);display:block;margin-bottom:4px;}
  .field input,.field select{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:14px;background:#FCFAF5;}
  .field-checkbox{display:flex;align-items:center;gap:8px;font-size:13px;padding:9px 2px;}
  .field-checkbox input{width:auto;}
  .section-title{font-size:13px;font-weight:700;color:var(--deep-blue);margin:20px 0 10px;border-left:3px solid var(--gold);padding-left:8px;}
  .modal-actions{display:flex;justify-content:space-between;margin-top:22px;gap:10px;flex-wrap:wrap;}
  .modal-actions .left{display:flex;gap:10px;flex-wrap:wrap;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--ink-soft);}
  .big-status{font-size:15px;margin:14px 0 20px;color:var(--ink-soft);}
  .big-time{font-family:'Noto Serif SC',serif;font-weight:900;font-size:30px;color:var(--crab-red-dark);margin-bottom:6px;}
  .clock-action-btn{width:100%;padding:16px;font-size:16px;border-radius:12px;}
  .loading-line{font-size:13px;color:var(--ink-soft);padding:20px;text-align:center;}
  .pin-input{font-size:22px;letter-spacing:8px;text-align:center;padding:12px;width:100%;border:1px solid var(--line);border-radius:8px;margin:10px 0 6px;}
  .err-text{color:var(--crab-red);font-size:12px;min-height:16px;}

  .camera-wrap{position:relative;width:180px;height:180px;margin:8px auto 18px;border-radius:50%;overflow:hidden;background:#EFEAE0;border:3px solid var(--gold);}
  .camera-wrap video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  .camera-msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--ink-soft);text-align:center;padding:10px;background:#EFEAE0;}
  .camera-msg.hidden{display:none;}
  .photo-thumb-btn{background:none;border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;color:var(--deep-blue);font-family:inherit;}
  .photo-thumb-btn:hover{background:var(--deep-blue);color:#fff;}
  .photo-lightbox-img{width:100%;border-radius:10px;margin-top:8px;background:#EFEAE0;min-height:160px;object-fit:cover;}

  .payslip-box{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:10px;}
  .payslip-head{background:var(--deep-blue);color:#fff;padding:14px 18px;}
  .payslip-head h3{margin:0;font-family:'Noto Serif SC',serif;font-size:17px;}
  .payslip-head .ps-sub{font-size:11px;opacity:.85;margin-top:2px;}
  .payslip-section{padding:12px 18px;border-bottom:1px solid var(--line);}
  .payslip-section:last-child{border-bottom:none;}
  .ps-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;}
  .ps-row.total{font-weight:900;font-size:15px;border-top:1px dashed var(--line);margin-top:6px;padding-top:8px;}
  .ps-row.net{color:var(--crab-red-dark);font-size:17px;font-weight:900;}
  .ps-label-sm{font-size:11px;color:var(--ink-soft);}
  .disclaimer-box{background:#FFF3E0;border:1px solid var(--gold);border-radius:8px;padding:10px 12px;font-size:11px;color:#7A5A10;margin-top:12px;}
  .month-picker{padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;}
  .att-summary{display:flex;gap:14px;margin:12px 0;flex-wrap:wrap;}
  .att-sum-chip{background:#F3EEE2;border-radius:10px;padding:10px 16px;font-size:12px;flex:1;min-width:120px;text-align:center;}
  .att-sum-chip b{display:block;font-size:20px;font-family:'Noto Serif SC',serif;color:var(--crab-red-dark);margin-top:2px;}

  .week-nav{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap;}
  .week-nav .wk-label{font-weight:700;font-size:14px;}
  .sched-table{width:100%;border-collapse:collapse;background:var(--paper);border-radius:12px;overflow:hidden;border:1px solid var(--line);}
  .sched-table th,.sched-table td{padding:8px 6px;text-align:center;font-size:12px;border:1px solid var(--line);}
  .sched-table th{background:#F3EEE2;color:var(--deep-blue);}
  .sched-table td.emp-name-cell{text-align:left;font-weight:700;white-space:nowrap;background:#FBF8F2;}
  .shift-cell{cursor:pointer;border-radius:6px;padding:6px 4px;min-height:34px;transition:background .1s;}
  .shift-cell:hover{background:#F3EEE2;}
  .shift-cell.has-shift{background:#E5F3EA;color:var(--good);font-weight:700;}
  .shift-cell.is-off{background:#FBEAEA;color:var(--crab-red-dark);font-weight:700;}
  .shift-cell.readonly{cursor:default;}
  .kpi-history-list{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
  .kpi-hist-row{display:flex;justify-content:space-between;align-items:center;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;}
  .kpi-hist-row b{color:var(--crab-red-dark);}
  .self-portal-tabs{display:flex;gap:8px;margin-bottom:18px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .custom-item-row{display:grid;grid-template-columns:1fr 120px 32px;gap:8px;margin-bottom:8px;align-items:center;}
  .custom-item-row input{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;}
  .custom-item-remove{background:none;border:none;color:var(--crab-red);font-size:18px;cursor:pointer;line-height:1;}
  .preset-btn-row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
  .preset-btn{padding:8px 14px;border-radius:8px;border:1.5px solid var(--deep-blue);background:#fff;color:var(--deep-blue);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
  .preset-btn:hover{background:var(--deep-blue);color:#fff;}
  .preset-btn.off-preset{border-color:var(--crab-red);color:var(--crab-red);}
  .preset-btn.off-preset:hover{background:var(--crab-red);color:#fff;}
  .holiday-row{display:flex;justify-content:space-between;align-items:center;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:6px;}
  .kpi-level-row{display:grid;grid-template-columns:1fr 110px;gap:12px;align-items:center;margin-bottom:8px;}
  .kpi-level-row label{font-size:12px;}
  .holiday-col-header{background:#FBEAEA !important;color:var(--crab-red-dark) !important;}

  @media print{
    body *{visibility:hidden;}
    #payslipPrintArea, #payslipPrintArea *{visibility:visible;}
    #payslipPrintArea{position:absolute;left:0;top:0;width:100%;}
  }

  @media (max-width:720px){
    .summary{grid-template-columns:repeat(2,1fr);}
    .outlet-split{grid-template-columns:1fr;}
    .field-row{grid-template-columns:1fr;}
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>

/* =========================================================================
   FIREBASE SETUP — replaces Claude Artifact's window.storage so this app
   can run on Vercel / your own domain with a real cloud database.

   HOW TO FILL THIS IN:
   1. Go to https://console.firebase.google.com → Create a project (free).
   2. In the project, click "Build > Firestore Database" → Create database
      → Start in PRODUCTION mode (we set proper rules below) → pick a region.
   3. Click the gear icon > Project settings > scroll to "Your apps" >
      click the web icon (</>) to register a new web app (any nickname).
   4. Firebase shows you a firebaseConfig object — copy those values into
      the object below, replacing every "REPLACE_ME..." placeholder.
   5. In Firestore > Rules, paste this (then click Publish):
        rules_version = '2';
        service cloud.firestore {
          match /databases/{database}/documents {
            match /talkcrab_data/{docId} {
              allow read, write: if true;
            }
          }
        }
      NOTE: "allow read, write: if true" means anyone who has your Firebase
      config (visible in your page source) can read/write this data. That
      matches this app's existing PIN-based security model (no separate
      login wall), but if you want it locked down further later, this is
      the place to add Firebase Authentication + rules — ask Claude to help
      with that as a follow-up.
   ========================================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyB8F-3rJ7TgJcuBMJg8jTB36ogltu4bvkk",

  projectId: "talkcrab-system",

};
firebase.initializeApp(firebaseConfig);
const _db = firebase.firestore();
const _COLLECTION = 'talkcrab_data';

// Drop-in replacement for the Claude-artifact-only window.storage API.
// Same method names/shapes as before, so nothing else in this file changes.
window.storage = {
  async get(key, shared){
    const doc = await _db.collection(_COLLECTION).doc(key).get();
    if(!doc.exists) throw new Error('Key not found: '+key);
    return { key, value: doc.data().value, shared: !!shared };
  },
  async set(key, value, shared){
    await _db.collection(_COLLECTION).doc(key).set({ value, updatedAt: Date.now() });
    return { key, value, shared: !!shared };
  },
  async delete(key, shared){
    await _db.collection(_COLLECTION).doc(key).delete();
    return { key, deleted: true, shared: !!shared };
  },
  async list(prefix, shared){
    const snap = await _db.collection(_COLLECTION).get();
    const keys = snap.docs.map(d=>d.id).filter(k=> !prefix || k.startsWith(prefix));
    return { keys, prefix, shared: !!shared };
  }
};

function todayStr(){ return new Date().toISOString().slice(0,10); }
function timeStr(d){ return d.toTimeString().slice(0,5); }
function initials(name){
  if(!name) return '?';
  const parts = name.trim().split(/\s+/);
  return parts.length===1 ? parts[0].slice(0,2) : (parts[0][0]||'')+(parts[1][0]||'');
}
function avatarInnerHTML(e){
  return e.photo ? '<img src="'+e.photo+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">' : initials(e.name);
}

function getTodayRecord(empId){
  const t = todayStr();
  return attendance.find(r=>r.employeeId===empId && r.date===t);
}
function renderStaffOutletTabs(){
  const wrap = document.getElementById('staffOutletTabs');
  wrap.innerHTML = OUTLETS.map(o=>'<button class="outlet-tab '+(o.id===staffOutletChoice?'active':'')+'" data-outlet="'+o.id+'">'+o.name+'</button>').join('');
  wrap.querySelectorAll('.outlet-tab').forEach(btn=>{
    btn.addEventListener('click', ()=>{ staffOutletChoice = btn.dataset.outlet; renderStaffOutletTabs(); renderClockGrid(); });
  });
}
function renderClockGrid(){
  const grid = document.getElementById('clockGrid');
  const empty = document.getElementById('staffEmpty');
  const list = employees.filter(e=>e.outlet===staffOutletChoice && !e.noClockRequired);
  if(list.length===0){ grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  grid.innerHTML = list.map(e=>{
    const rec = getTodayRecord(e.id);
    let pill = '<span class="status-pill status-none">'+t('statusNone')+'</span>';
    if(rec && rec.clockIn && !rec.clockOut) pill = '<span class="status-pill status-in">'+t('statusIn')+' '+rec.clockIn+'</span>';
    if(rec && rec.clockIn && rec.clockOut) pill = '<span class="status-pill status-out">'+t('statusOut')+' '+rec.clockOut+'</span>';
    return '<div class="clock-card" data-id="'+e.id+'"><div class="clock-avatar">'+avatarInnerHTML(e)+'</div><div class="clock-name">'+e.name+'</div><div class="clock-role">'+(e.role||'')+'</div>'+pill+'</div>';
  }).join('');
  grid.querySelectorAll('.clock-card').forEach(card=>{
    card.addEventListener('click', ()=> openClockModal(card.dataset.id));
  });
}

/* ================= CAMERA ================= */
let camStream = null;
async function startCamera(){
  const msg = document.getElementById('cameraMsg');
  const video = document.getElementById('camPreview');
  msg.textContent = ''; msg.classList.add('hidden');
  try{
    camStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}, audio:false});
    video.srcObject = camStream;
  }catch(err){
    msg.textContent = '无法开启摄像头，打卡仍会记录，但不会有照片';
    msg.classList.remove('hidden');
    camStream = null;
  }
}
function stopCamera(){
  if(camStream){ camStream.getTracks().forEach(tk=>tk.stop()); camStream = null; }
  const video = document.getElementById('camPreview');
  if(video) video.srcObject = null;
}
function capturePhotoDataURL(){
  const video = document.getElementById('camPreview');
  if(!camStream || !video.videoWidth) return null;
  const canvas = document.getElementById('camCanvas');
  const targetW = 240;
  const targetH = Math.round(targetW * video.videoHeight / video.videoWidth);
  canvas.width = targetW; canvas.height = targetH;
  const ctx = canvas.getContext('2d');
  ctx.translate(targetW,0); ctx.scale(-1,1);
  ctx.drawImage(video, 0, 0, targetW, targetH);
  try{ return canvas.toDataURL('image/jpeg', 0.6); }catch(e){ return null; }
}
function photoKey(employeeId, date, type){ return 'tc_photo_'+employeeId+'_'+date+'_'+type; }
async function savePhoto(employeeId, date, type, dataUrl){
  if(!dataUrl) return;
  try{ await window.storage.set(photoKey(employeeId,date,type), dataUrl, true); }
  catch(err){ /* non-blocking */ }
}
async function loadPhoto(employeeId, date, type){
  const r = await window.storage.get(photoKey(employeeId,date,type), true);
  return r ? r.value : null;
}

function openClockModal(id){
  activeClockEmp = employees.find(e=>e.id===id);
  if(!activeClockEmp) return;
  document.getElementById('clockModalName').textContent = activeClockEmp.name;
  document.getElementById('clockModalRole').textContent = (activeClockEmp.role||'') + ' · ' + outletName(activeClockEmp.outlet);
  document.getElementById('clockNowTime').textContent = timeStr(new Date());
  const rec = getTodayRecord(id);
  const btn = document.getElementById('clockActionBtn');
  const statusText = document.getElementById('clockStatusText');
  if(!rec || !rec.clockIn){ statusText.textContent = t('statusNone'); btn.textContent = '📷 ' + t('statusIn'); btn.dataset.action='in'; }
  else if(rec.clockIn && !rec.clockOut){ statusText.textContent = t('statusIn')+' '+rec.clockIn; btn.textContent = '📷 ' + t('statusOut'); btn.dataset.action='out'; }
  else{ statusText.textContent = rec.clockIn+' → '+rec.clockOut; btn.textContent = '✓'; btn.dataset.action='done'; }
  document.getElementById('clockOverlay').classList.add('active');
  if(btn.dataset.action!=='done') startCamera();
}
function closeClockModal(){
  stopCamera();
  document.getElementById('clockOverlay').classList.remove('active');
}
async function handleClockAction(){
  const btn = document.getElementById('clockActionBtn');
  const action = btn.dataset.action;
  if(action==='done' || !activeClockEmp) return;
  const photoData = capturePhotoDataURL();
  btn.disabled = true;
  const t0 = todayStr(); const now = timeStr(new Date());
  let rec = attendance.find(r=>r.employeeId===activeClockEmp.id && r.date===t0);
  if(!rec){ rec = {employeeId:activeClockEmp.id, date:t0, clockIn:null, clockOut:null}; attendance.push(rec); }
  if(action==='in') rec.clockIn = now;
  if(action==='out') rec.clockOut = now;
  await saveAttendance();
  await savePhoto(activeClockEmp.id, t0, action, photoData);
  btn.disabled = false;
  closeClockModal();
  renderClockGrid();
  if(session.role==='store') { renderProfileGrid(); renderAttendanceTab(); }
  if(session.role==='boss') { renderBossAll(); }
}
async function openPhotoModal(employeeId, employeeName, date, type){
  document.getElementById('photoModalMeta').textContent = employeeName+' · '+date+' · '+(type==='in'?t('statusIn'):t('statusOut'));
  document.getElementById('photoModalImg').src = '';
  document.getElementById('photoModalImg').classList.add('hidden');
  document.getElementById('photoModalErr').textContent = '...';
  document.getElementById('photoOverlay').classList.add('active');
  try{
    const url = await loadPhoto(employeeId, date, type);
    if(url){
      document.getElementById('photoModalImg').src = url;
      document.getElementById('photoModalImg').classList.remove('hidden');
      document.getElementById('photoModalErr').textContent = '';
    }else{
      document.getElementById('photoModalErr').textContent = '—';
    }
  }catch(err){ document.getElementById('photoModalErr').textContent = '—'; }
}

    return matchQ && matchRole;

  applySortInPlace(list, sortBy);
  return list;
}
function applySortInPlace(list, sortBy){
  if(sortBy==='name') list.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  if(sortBy==='level_desc') list.sort((a,b)=>Number(b.level||0)-Number(a.level||0));
  if(sortBy==='salary_desc') list.sort((a,b)=>Number(b.salary||0)-Number(a.salary||0));
  if(sortBy==='join_desc') list.sort((a,b)=>new Date(b.join||0)-new Date(a.join||0));
}

function resizeImageFile(file, maxSize){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w>h){ if(w>maxSize){ h = Math.round(h*maxSize/w); w = maxSize; } }
        else{ if(h>maxSize){ w = Math.round(w*maxSize/h); h = maxSize; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
document.getElementById('f_photo_input').addEventListener('change', async (ev)=>{

  };

function hoursBetween(inStr, outStr){
  if(!inStr || !outStr) return 0;
  const p1 = inStr.split(':').map(Number);
  const p2 = outStr.split(':').map(Number);
  let mins = (p2[0]*60+p2[1]) - (p1[0]*60+p1[1]);
  if(mins < 0) mins += 24*60;
  return mins/60;
}
function daysInMonth(ym){
  const parts = ym.split('-').map(Number);
  return new Date(parts[0], parts[1], 0).getDate();
}

/* ================= OVERTIME CALCULATION ================= */
const OT_RULES = {
  local:   {lunch:1, standard:8,  otFreeThreshold:4000},
  foreign: {lunch:2, standard:10, otFreeThreshold:null}
};
const ASSUMED_WORKDAYS_PER_MONTH = 26;
function dailyNetHours(clockIn, clockOut, lunchHours){
  const raw = hoursBetween(clockIn, clockOut);
  if(!raw) return 0;
  return Math.max(0, raw - lunchHours);
}
function dailyOvertimeHours(netHours, standardHours){
  const ot = netHours - standardHours;
  if(ot <= 0) return 0;
  return Math.floor(ot*2)/2;
}
function hourlyRateEstimate(basic, standardHours){
  return basic / (ASSUMED_WORKDAYS_PER_MONTH * standardHours);
}
function monthlyOvertimeStats(emp, ym){
  if(emp.noClockRequired) return {otHours:0, otPay:0, holidayDays:0, holidayPay:0, totalWorkedHours:0, workDays:0};
  const rules = emp.isLocal ? OT_RULES.local : OT_RULES.foreign;
  const basic = Number(emp.salary||0);
  const otExempt = emp.isLocal && rules.otFreeThreshold!=null && basic >= rules.otFreeThreshold;
  const dim = daysInMonth(ym);
  let otHours=0, holidayDays=0, totalWorkedHours=0, workDays=0;
  for(let d=1; d<=dim; d++){
    const dateStr = ym+'-'+String(d).padStart(2,'0');
    const rec = attendance.find(r=>r.employeeId===emp.id && r.date===dateStr);
    if(rec && rec.clockIn && rec.clockOut){
      const net = dailyNetHours(rec.clockIn, rec.clockOut, rules.lunch);
      totalWorkedHours += net;
      workDays++;
      if(!otExempt){
        otHours += dailyOvertimeHours(net, rules.standard);
        if(isPublicHoliday(dateStr)) holidayDays++;
      }
    }
  }
  const rate = hourlyRateEstimate(basic, rules.standard);
  const otPay = otExempt ? 0 : Math.round(otHours * rate * 1.5);
  const dailyRate = basic / ASSUMED_WORKDAYS_PER_MONTH;
  const holidayPay = otExempt ? 0 : Math.round(holidayDays * dailyRate);
  return {otHours, otPay, holidayDays, holidayPay, totalWorkedHours:Math.round(totalWorkedHours*10)/10, workDays};
}

const LATE_GRACE_MINUTES = 15;
const LATE_RATE_PER_MIN = 1;
function lateMinutesForDay(clockIn, shiftStart){
  if(!clockIn || !shiftStart) return 0;
  const p1 = shiftStart.split(':').map(Number);
  const p2 = clockIn.split(':').map(Number);
  const diff = (p2[0]*60+p2[1]) - (p1[0]*60+p1[1]);
  return diff > 0 ? diff : 0;
}
function monthlyLateStats(employeeId, shiftStart, ym){
  const emp = employees.find(x=>x.id===employeeId);
  if(emp && emp.noClockRequired) return {lateDays:0, totalLateMinutes:0, deduction:0, hasShift:false};
  if(!shiftStart) return {lateDays:0, totalLateMinutes:0, deduction:0, hasShift:false};
  const dim = daysInMonth(ym);
  let lateDays = 0, totalLateMinutes = 0;
  for(let d=1; d<=dim; d++){
    const dateStr = ym + '-' + String(d).padStart(2,'0');
    const rec = attendance.find(r=>r.employeeId===employeeId && r.date===dateStr);
    if(rec && rec.clockIn){
      const mins = lateMinutesForDay(rec.clockIn, shiftStart);
      if(mins > 0){ lateDays++; totalLateMinutes += mins; }
    }
  }
  const deduction = Math.max(0, totalLateMinutes - LATE_GRACE_MINUTES) * LATE_RATE_PER_MIN;
  return {lateDays, totalLateMinutes, deduction, hasShift:true};
}

const LEAVE_KEY = 'tc_leave_log';
let leaveLog = [];
async function loadLeaveLog(){

async function saveLeaveLog(){

function serviceYearsAt(joinDate, asOfDateStr){
  if(!joinDate) return 0;
  const j = new Date(joinDate+'T00:00:00');
  const a = new Date(asOfDateStr+'T00:00:00');
  const diff = a - j;
  if(diff < 0) return -1;
  return diff / (365.25*24*60*60*1000);
}
function tierAnnualDays(years){ if(years<2) return 8; if(years<5) return 12; return 16; }
function tierSickDays(years){ if(years<2) return 14; if(years<5) return 18; return 22; }
function getLeaveEntitlement(emp, year, type){
  const override = type==='annual' ? emp.annualLeaveOverride : emp.sickLeaveOverride;
  if(override!=null && override!=='') return Number(override);
  const yearStartStr = year+'-01-01';
  const yearEndStr = year+'-12-31';
  const join = emp.join || yearStartStr;
  if(join > yearEndStr) return 0;
  const yearsAtYearStart = serviceYearsAt(join, yearStartStr);
  const fullDays = type==='annual' ? tierAnnualDays(Math.max(0,yearsAtYearStart)) : tierSickDays(Math.max(0,yearsAtYearStart));
  if(join > yearStartStr){
    const joinDate = new Date(join+'T00:00:00');
    const monthsRemaining = 12 - joinDate.getMonth();
    return Math.round(fullDays * monthsRemaining / 12);
  }
  return fullDays;
}
function getLeaveUsed(employeeId, type, year){
  return leaveLog.filter(l=>l.employeeId===employeeId && l.type===type && l.date.slice(0,4)===String(year)).length;
}
function getLeaveStats(emp, year){
  const annualEnt = getLeaveEntitlement(emp, year, 'annual');
  const annualUsed = getLeaveUsed(emp.id, 'annual', year);
  const sickEnt = getLeaveEntitlement(emp, year, 'sick');
  const sickUsed = getLeaveUsed(emp.id, 'sick', year);
  return {annualEnt, annualUsed, annualBalance:annualEnt-annualUsed, sickEnt, sickUsed, sickBalance:sickEnt-sickUsed};
}

/* ================= PAYSLIP: KWSP (EPF) + PCB ESTIMATE ================= */
function calcEPF(basicWage, age60){
  const empRate = age60 ? 0.055 : 0.11;
  const erRate = age60 ? (basicWage<=5000?0.065:0.06) : (basicWage<=5000?0.13:0.12);
  return { employee: Math.round(basicWage*empRate), employer: Math.round(basicWage*erRate) };
}
const SOCSO_CEILING = 6000;
function calcSOCSO(wage, age60){
  const capped = Math.min(Number(wage||0), SOCSO_CEILING);
  if(age60){
    return { employee: 0, employer: Math.round(capped*0.0125) };
  }
  return { employee: Math.round(capped*0.005), employer: Math.round(capped*0.0175) };
}
function progressiveAnnualTax(chargeable){
  const bands = [
    [0,5000,0], [5000,20000,0.01], [20000,35000,0.03], [35000,50000,0.06],
    [50000,70000,0.11], [70000,100000,0.19], [100000,400000,0.25],
    [400000,600000,0.26], [600000,2000000,0.28], [2000000,Infinity,0.30]
  ];
  let tax = 0;
  for(const band of bands){
    const lo=band[0], hi=band[1], rate=band[2];
    if(chargeable > lo){
      const taxable = Math.min(chargeable,hi) - lo;
      tax += taxable * rate;
    }
  }
  return tax;
}
function calcPCB(emp, monthlyTaxable){
  const annualGross = monthlyTaxable * 12;
  const epfAnnualRelief = Math.min(annualGross * (emp.age60?0.055:0.11), 4000);
  const personalRelief = 9000;
  const spouseRelief = (emp.marital==='married' && !emp.spouseWorking) ? 4000 : 0;
  const childRelief = 2000 * (Number(emp.numChildren)||0);
  let chargeable = annualGross - epfAnnualRelief - personalRelief - spouseRelief - childRelief;
  if(chargeable < 0) chargeable = 0;
  let annualTax = progressiveAnnualTax(chargeable);
  let rebate = 0;
  if(chargeable <= 35000){ rebate += 400; if(spouseRelief>0) rebate += 400; }
  const netAnnualTax = Math.max(annualTax - rebate, 0);
  return netAnnualTax/12;
}
function getSalaryForMonth(emp, ym){
  const hist = emp.salaryHistory || [];
  if(!hist.length || !ym) return Number(emp.salary||0);
  const applicable = hist.filter(h=>h.month<=ym).sort((a,b)=>b.month.localeCompare(a.month));
  return applicable.length ? Number(applicable[0].salary) : Number(emp.salary||0);
}
function monthlyPartTimeStats(emp, ym){
  const rate = Number(emp.hourlyRate||0);
  const dim = daysInMonth(ym);
  let regularHours=0, holidayHours=0, workDays=0;
  for(let d=1; d<=dim; d++){
    const dateStr = ym+'-'+String(d).padStart(2,'0');
    const rec = attendance.find(r=>r.employeeId===emp.id && r.date===dateStr);
    if(rec && rec.clockIn && rec.clockOut){
      const hrs = hoursBetween(rec.clockIn, rec.clockOut);
      workDays++;
      if(isPublicHoliday(dateStr)) holidayHours += hrs;
      else regularHours += hrs;
    }
  }
  const regularPay = Math.round(regularHours * rate);
  const holidayPay = Math.round(holidayHours * rate * 1.5);
  return {
    regularHours: Math.round(regularHours*10)/10,
    holidayHours: Math.round(holidayHours*10)/10,
    workDays, rate, regularPay, holidayPay,
    totalWorkedHours: Math.round((regularHours+holidayHours)*10)/10
  };
}
function computePayslip(emp, ym){
  const isPartTime = emp.employmentType === 'parttime';
  const allowance = Number(emp.allowance||0);
  const bonus = Number(emp.bonus||0);
  const kpiAllowance = getKpiAllowanceForEmployee(emp);
  const customEarnings = emp.customEarnings || [];
  const customEarningsTotal = customEarnings.reduce((a,c)=>a+Number(c.amount||0),0);

  let basic, otStats, ptStats = null;
  if(isPartTime){
    basic = 0;
    ptStats = ym ? monthlyPartTimeStats(emp, ym) : {regularHours:0,holidayHours:0,workDays:0,rate:Number(emp.hourlyRate||0),regularPay:0,holidayPay:0,totalWorkedHours:0};
    // Part-time pay has no separate "overtime premium" bucket — every hour is paid
    // at the hourly rate already (only public holiday hours get the x1.5 premium).
    otStats = {otHours:0, otPay:ptStats.regularPay, holidayDays:0, holidayPay:ptStats.holidayPay, totalWorkedHours:ptStats.totalWorkedHours, workDays:ptStats.workDays};
  }else{
    basic = ym ? getSalaryForMonth(emp, ym) : Number(emp.salary||0);
    otStats = ym ? monthlyOvertimeStats(Object.assign({}, emp, {salary:basic}), ym) : {otHours:0,otPay:0,holidayDays:0,holidayPay:0,totalWorkedHours:0,workDays:0};
  }
  const gross = basic + allowance + bonus + kpiAllowance + customEarningsTotal + otStats.otPay + otStats.holidayPay;

  let epf = {employee:0, employer:0};
  let socso = {employee:0, employer:0};
  let pcb = 0;
  if(emp.isLocal){
    epf = calcEPF(isPartTime ? gross : basic, emp.age60); // KWSP is based on basic salary only (part-time: on total wages since there's no fixed basic)
    socso = calcSOCSO(gross, emp.age60);
    if(!isPartTime && basic > 4500){ pcb = Math.round(calcPCB(emp, gross)); }
  }
  const lateStats = (ym && !isPartTime) ? monthlyLateStats(emp.id, emp.shiftStart, ym) : {deduction:0, hasShift:false};
  const lateDeduction = lateStats.deduction || 0;
  const loanAdvance = Number(emp.loanAdvance||0);
  const rent = Number(emp.rent||0);
  const customDeductions = emp.customDeductions || [];
  const customDeductionsTotal = customDeductions.reduce((a,c)=>a+Number(c.amount||0),0);
  const totalDeductions = loanAdvance + epf.employee + socso.employee + rent + pcb + lateDeduction + customDeductionsTotal;
  const net = gross - totalDeductions;
  return {basic:basic, allowance:allowance, bonus:bonus, kpiAllowance:kpiAllowance,
    isPartTime:isPartTime, ptStats:ptStats,
    customEarnings:customEarnings, customEarningsTotal:customEarningsTotal,
    otStats:otStats, gross:gross, epf:epf, socso:socso, pcb:pcb, lateDeduction:lateDeduction, lateStats:lateStats,
    loanAdvance:loanAdvance, rent:rent,
    customDeductions:customDeductions, customDeductionsTotal:customDeductionsTotal,
    totalDeductions:totalDeductions, net:net};
}

/* ================= PDF EXPORT ================= */
async function generatePayslipPDF(emp, ym, ps){
  if(!window.jspdf || !window.html2canvas){ alert('PDF library failed to load, please check your network and try again.'); return; }
  const { jsPDF } = window.jspdf;

  // Build an off-screen copy of the on-screen payslip markup so html2canvas
  // can rasterize the real fonts (this correctly renders Chinese/Burmese,
  // which jsPDF's built-in fonts cannot do on their own).
  const container = document.createElement('div');
  container.style.position = 'fixed';
  container.style.left = '-9999px';
  container.style.top = '0';
  container.style.width = '600px';
  container.style.background = '#ffffff';
  container.style.padding = '24px';
  container.style.boxSizing = 'border-box';
  container.innerHTML =
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">'
    +'<span style="font-family:\'Noto Serif SC\',serif;font-weight:900;font-size:22px;color:#B8151B;">TALKCRAB</span>'
    +'<span style="font-size:11px;color:#6B655C;">Payslip / 工资单</span>'
    +'</div>'
    + payslipHTML(emp, ym, ps);
  document.body.appendChild(container);

  let canvas;
  try{
    canvas = await html2canvas(container, {scale:2, backgroundColor:'#ffffff', useCORS:true});
  }catch(err){
    document.body.removeChild(container);
    alert('PDF generation failed, please try again.');
    return;
  }
  document.body.removeChild(container);

  const pdf = new jsPDF({unit:'pt', format:'a4'});
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();
  const margin = 32;
  const imgWidth = pageWidth - margin*2;
  const imgHeight = canvas.height * imgWidth / canvas.width;
  const imgData = canvas.toDataURL('image/png');

  let heightLeft = imgHeight;
  let renderedY = 0;
  pdf.addImage(imgData, 'PNG', margin, margin - renderedY, imgWidth, imgHeight);
  heightLeft -= (pageHeight - margin*2);

  while(heightLeft > 0){
    renderedY += (pageHeight - margin*2);
    pdf.addPage();
    pdf.addImage(imgData, 'PNG', margin, margin - renderedY, imgWidth, imgHeight);
    heightLeft -= (pageHeight - margin*2);
  }

  const filename = 'Payslip_'+emp.name.replace(/\s+/g,'_')+'_'+ym+'.pdf';
  pdf.save(filename);
}

function mondayOf(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const day = d.getDay();
  const diff = day===0 ? -6 : 1-day;
  d.setDate(d.getDate()+diff);
  return d.toISOString().slice(0,10);
}
function addDaysStr(dateStr, n){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}
function weekDatesFrom(mondayStr){
  const arr = [];
  for(let i=0;i<7;i++) arr.push(addDaysStr(mondayStr,i));
  return arr;
}
const WEEKDAY_KEYS = ['mon','tue','wed','thu','fri','sat','sun'];
function getShift(employeeId, date){ return schedule.find(s=>s.employeeId===employeeId && s.date===date); }
function shiftCellContent(s){
  if(!s) return '<span style="color:var(--ink-soft);font-size:10px;">'+t('noShift')+'</span>';
  if(s.off) return t('offDay');
  if(s.start && s.end) return s.start+'-'+s.end;
  return '<span style="color:var(--ink-soft);font-size:10px;">'+t('noShift')+'</span>';
}
function shiftCellClass(s){
  if(!s) return '';
  if(s.off) return 'is-off';
  if(s.start||s.end) return 'has-shift';
  return '';
}
function weekLabelText(weekMonday){
  const dates = weekDatesFrom(weekMonday);
  return dates[0] + '  ~  ' + dates[6];
}
function buildScheduleTableHTML(tableId, weekMonday, employeesList, editable){
  const dates = weekDatesFrom(weekMonday);
  const head = '<thead><tr><th>'+t('colName')+'</th>' + dates.map((d,i)=>{
    const hCls = isPublicHoliday(d) ? ' holiday-col-header' : '';
    return '<th class="'+hCls+'">'+t(WEEKDAY_KEYS[i])+'<br><span style="font-weight:400;">'+d.slice(5)+'</span></th>';
  }).join('') + '</tr></thead>';
  const body = '<tbody>' + (employeesList.length ? employeesList.map(e=>{
    const cells = dates.map(d=>{
      const s = getShift(e.id, d);
      const cls = shiftCellClass(s);
      const roCls = editable ? '' : ' readonly';
      const dataAttrs = editable ? (' data-schedemp="'+e.id+'" data-scheddate="'+d+'" data-schedname="'+e.name+'"') : '';
      const hMark = isPublicHoliday(d) ? ' 🎉' : '';
      return '<td><div class="shift-cell '+cls+roCls+'"'+dataAttrs+'>'+shiftCellContent(s)+hMark+'</div></td>';
    }).join('');
    return '<tr><td class="emp-name-cell">'+e.name+'</td>'+cells+'</tr>';
  }).join('') : ('<tr><td colspan="8" style="text-align:center;color:var(--ink-soft);">'+t('emptyEmployees')+'</td></tr>')) + '</tbody>';
  document.getElementById(tableId).innerHTML = head+body;
  if(editable){
    document.querySelectorAll('#'+tableId+' .shift-cell[data-schedemp]').forEach(cell=>{
      cell.addEventListener('click', ()=> openShiftModal(cell.dataset.schedemp, cell.dataset.schedname, cell.dataset.scheddate));
    });
  }
}

const PRESET_KEY = 'tc_shift_presets';
let shiftPresets = [
  {id:'p_morning', label:'早班', start:'10:00', end:'19:00', off:false},
  {id:'p_evening', label:'晚班', start:'14:00', end:'23:00', off:false},
  {id:'p_off', label:'OFF', start:'', end:'', off:true}
];
async function loadPresets(){
  try{ const r = await window.storage.get(PRESET_KEY, true); if(r) shiftPresets = JSON.parse(r.value); }
  catch(err){ /* keep defaults */ }
}
async function savePresets(){
  try{ await window.storage.set(PRESET_KEY, JSON.stringify(shiftPresets), true); }
  catch(err){ alert('保存失败'); }
}
function renderShiftPresetButtons(){
  const row = document.getElementById('shiftPresetRow');
  row.innerHTML = shiftPresets.map(p=>
    '<button type="button" class="preset-btn'+(p.off?' off-preset':'')+'" data-presetid="'+p.id+'">'+p.label+(p.off?'':(' '+p.start+'-'+p.end))+'</button>'
  ).join('');
  row.querySelectorAll('[data-presetid]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const p = shiftPresets.find(x=>x.id===btn.dataset.presetid);
      if(!p) return;
      document.getElementById('shift_start').value = p.start||'';
      document.getElementById('shift_end').value = p.end||'';
      document.getElementById('shift_off').checked = !!p.off;
      await saveShift();
    });
  });
}
async function saveCurrentAsPreset(){
  const label = prompt(t('presetNamePh'));
  if(!label) return;
  shiftPresets.push({
    id:'p_'+Date.now(), label:label.trim(),
    start:document.getElementById('shift_start').value||'',
    end:document.getElementById('shift_end').value||'',
    off:document.getElementById('shift_off').checked
  });
  await savePresets();
  renderShiftPresetButtons();
}
function openShiftModal(employeeId, employeeName, date){
  shiftModalEmpId = employeeId; shiftModalDate = date;
  const holidayTag = isPublicHoliday(date) ? (' · '+t('publicHolidayTag')) : '';
  document.getElementById('shiftModalMeta').textContent = employeeName+' · '+date+holidayTag;
  renderShiftPresetButtons();
  const s = getShift(employeeId, date);
  document.getElementById('shift_start').value = s?.start || '';
  document.getElementById('shift_end').value = s?.end || '';
  document.getElementById('shift_off').checked = s?.off || false;
  document.getElementById('shift_note').value = s?.note || '';
  document.getElementById('shiftOverlay').classList.add('active');
}
function closeShiftModal(){ document.getElementById('shiftOverlay').classList.remove('active'); shiftModalEmpId=null; shiftModalDate=null; }
async function saveShift(){
  if(!shiftModalEmpId||!shiftModalDate) return;
  let s = schedule.find(x=>x.employeeId===shiftModalEmpId && x.date===shiftModalDate);
  if(!s){ s = {id:'sh_'+Date.now(), employeeId:shiftModalEmpId, date:shiftModalDate}; schedule.push(s); }
  s.start = document.getElementById('shift_start').value || '';
  s.end = document.getElementById('shift_end').value || '';
  s.off = document.getElementById('shift_off').checked;
  s.note = document.getElementById('shift_note').value.trim();
  await saveSchedule();
  closeShiftModal();
  refreshScheduleViews();
}
async function clearShiftFn(){
  if(!shiftModalEmpId||!shiftModalDate) return;
  schedule = schedule.filter(x=>!(x.employeeId===shiftModalEmpId && x.date===shiftModalDate));
  await saveSchedule();
  closeShiftModal();
  refreshScheduleViews();
}

    document.querySelectorAll('#bossView .tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.btab;
    document.getElementById('btabProfiles').classList.toggle('hidden', tab!=='profiles');
    document.getElementById('btabAttendance').classList.toggle('hidden', tab!=='attendance');
    document.getElementById('btabLate').classList.toggle('hidden', tab!=='late');
    document.getElementById('btabSchedule').classList.toggle('hidden', tab!=='schedule');
    if(tab==='attendance') renderBossAttendanceTab();
    if(tab==='late') renderBossLateTab();
    if(tab==='schedule') renderBossSchedule();
  });
});

document.querySelectorAll('#employeeScheduleView .tab-btn').forEach(btn=>{
